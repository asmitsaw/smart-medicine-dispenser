<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Medicine System</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#fefefe;
  color:#000;
  padding:20px;
}

/* TITLE */
h1{
  text-align:center;
  font-size:26px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* CARD (NEO BRUTAL STYLE) */
.card{
  background:#fff;
  border:3px solid black;
  padding:20px;
  box-shadow:6px 6px 0px black;
  transition:0.2s;
}

.card:hover{
  transform:translate(-3px,-3px);
  box-shadow:9px 9px 0px black;
}

h2{
  margin-bottom:10px;
  font-size:18px;
}

/* STATUS */
#status{
  font-size:22px;
  font-weight:bold;
}

.badge{
  margin-top:8px;
  display:inline-block;
  padding:5px 10px;
  border:2px solid black;
}

.online{ background:#22c55e; }
.offline{ background:#ef4444; }

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:3px solid black;
  background:#facc15;
  font-weight:bold;
  cursor:pointer;
  box-shadow:4px 4px 0 black;
}

button:active{
  transform:translate(2px,2px);
  box-shadow:none;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:3px solid black;
  margin-top:10px;
}

/* POPUP */
#popup{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:15px;
  border:3px solid black;
  background:#000;
  color:#fff;
  display:none;
  box-shadow:5px 5px 0 black;
}

</style>
</head>

<body>

<h1>💊 Smart Medicine System</h1>

<div class="grid">

<div class="card">
<h2>Status</h2>
<div id="status">Loading...</div>
<div id="connection" class="badge online">Online</div>
</div>

<div class="card">
<h2>Current Time</h2>
<div id="clock"></div>
</div>

<div class="card">
<h2>Manual Control</h2>
<button onclick="dispense(event)">Dispense Medicine</button>
</div>

<div class="card">
<h2>Set Medicine Time</h2>
<input type="time" id="timeInput">
<button onclick="setTime()">Set Time</button>
</div>

<div class="card">
<h2>Medicine History</h2>
<canvas id="chart"></canvas>
</div>

</div>

<div id="popup"><span id="popupText"></span></div>

<script>
const token = "9IZnV6T6HxYj6A4wMb6dM-aoUAo0J8eU";

// CLOCK
setInterval(()=>{
 document.getElementById("clock").innerText =
 new Date().toLocaleTimeString();
},1000);

// DISPENSE
function dispense(e){
 let btn=e.target;
 btn.disabled=true;
 btn.innerText="Processing...";

 fetch(`https://blynk.cloud/external/api/update?token=${token}&V1=1`)
 .then(()=>{
  setTimeout(()=>{
    btn.disabled=false;
    btn.innerText="Dispense Medicine";
  },3000);
 });
}

// SET TIME
function setTime(){
 let t=document.getElementById("timeInput").value;
 if(!t) return alert("Select time");

 let [h,m]=t.split(":");
 let sec=h*3600 + m*60;

 fetch(`https://blynk.cloud/external/api/update?token=${token}&V0=${sec}`)
 .then(()=>alert("Time Updated"));
}

// POPUP
function showPopup(msg){
 let p=document.getElementById("popup");
 let t=document.getElementById("popupText");

 t.innerText=msg;
 p.style.display="block";

 setTimeout(()=>p.style.display="none",3000);
}

// CHART
let taken=parseInt(localStorage.getItem("taken")) || 0;
let missed=parseInt(localStorage.getItem("missed")) || 0;

let chart=new Chart(document.getElementById("chart"),{
 type:'doughnut',
 data:{
  labels:['Taken','Missed'],
  datasets:[{
    data:[taken,missed],
    backgroundColor:['#22c55e','#ef4444']
  }]
 }
});

// STATUS
let last="";
function getStatus(){
 fetch(`https://blynk.cloud/external/api/get?token=${token}&V3`)
 .then(r=>r.text())
 .then(d=>{

  document.getElementById("status").innerText=d;

  if(d!==last){

   if(d.includes("Take")){
     showPopup("⏰ Time to take medicine!");
   }

   if(d.includes("Taken")){
     taken++;
     localStorage.setItem("taken",taken);
     showPopup("✅ Medicine Taken");
   }

   if(d.includes("Missed")){
     missed++;
     localStorage.setItem("missed",missed);
     showPopup("❌ Missed Dose");
   }

   chart.data.datasets[0].data=[taken,missed];
   chart.update();

   last=d;
  }

 })
 .catch(()=>{
  document.getElementById("connection").innerText="Offline";
  document.getElementById("connection").className="badge offline";
 });
}

getStatus();
setInterval(getStatus,2000);

// PWA
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
