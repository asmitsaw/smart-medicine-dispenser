<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Medicine System</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:20px;
  font-size:26px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* GLASS + BRUTAL CARD */
.card{
  backdrop-filter:blur(14px);
  background:rgba(255,255,255,0.05);
  border:2px solid white;
  border-radius:18px;
  padding:20px;
  box-shadow:6px 6px 0px #000;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
}

/* STATUS */
.status{
  font-size:22px;
  font-weight:bold;
}

.badge{
  margin-top:8px;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
}

.online{background:#22c55e;}
.offline{background:#ef4444;}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:active{transform:scale(0.95);}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* POPUP */
#popup{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:15px;
  border-radius:12px;
  background:black;
  display:none;
  animation:fade 0.3s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<h1>💊 Smart Medicine System</h1>

<div class="grid">

<div class="card">
<h2>Status</h2>
<div id="status" class="status">Loading...</div>
<div id="connection" class="badge online">Online</div>
</div>

<div class="card">
<h2>Time</h2>
<div id="clock" class="status"></div>
</div>

<div class="card">
<h2>Manual</h2>
<button onclick="dispense()">Dispense</button>
</div>

<div class="card">
<h2>Set Time</h2>
<input type="time" id="timeInput">
<button onclick="setTime()">Set</button>
</div>

<div class="card">
<h2>Medicine Stats</h2>
<canvas id="chart"></canvas>
</div>

</div>

<div id="popup"><span id="popupText"></span></div>

<script>
const token = "9IZnV6T6HxYj6A4wMb6dM-aoUAo0J8eU";

// CLOCK
setInterval(()=>{
 clock.innerText=new Date().toLocaleTimeString();
},1000);

// DISPENSE
function dispense(){
 fetch(`https://blynk.cloud/external/api/update?token=${token}&V1=1`);
 speak("Dispensing medicine");
}

// SET TIME
function setTime(){
 let t=timeInput.value;
 if(!t) return alert("Select time");

 let [h,m]=t.split(":");
 fetch(`https://blynk.cloud/external/api/update?token=${token}&V0=${h*3600+m*60}`);

 showPopup("Time Updated");
}

// 🔔 VOICE ALERT
function speak(text){
 let speech=new SpeechSynthesisUtterance(text);
 speech.lang="en-US";
 speech.rate=1;
 window.speechSynthesis.speak(speech);
}

// POPUP
function showPopup(msg){
 popupText.innerText=msg;
 popup.style.display="block";
 setTimeout(()=>popup.style.display="none",3000);
}

// CHART
let taken=parseInt(localStorage.getItem("taken"))||0;
let missed=parseInt(localStorage.getItem("missed"))||0;

let chart=new Chart(chart,{
 type:'doughnut',
 data:{
  labels:['Taken','Missed'],
  datasets:[{
    data:[taken,missed],
    backgroundColor:['#22c55e','#ef4444']
  }]
 }
});

// STATUS + CLOUD LOG SIMULATION
let last="";
function getStatus(){
 fetch(`https://blynk.cloud/external/api/get?token=${token}&V3`)
 .then(r=>r.text())
 .then(d=>{
  status.innerText=d;

  if(d!=last){

    if(d.includes("Take")){
      showPopup("⏰ Time to take medicine");
      speak("Time to take medicine");
    }

    if(d.includes("Taken")){
      taken++;
      localStorage.setItem("taken",taken);
      showPopup("Medicine Taken");
    }

    if(d.includes("Missed")){
      missed++;
      localStorage.setItem("missed",missed);
      showPopup("Missed Dose");
    }

    chart.data.datasets[0].data=[taken,missed];
    chart.update();

    last=d;
  }
 })
 .catch(()=>{
  connection.innerText="Offline";
  connection.className="badge offline";
 });
}

getStatus();
setInterval(getStatus,2000);

// PUSH NOTIFICATION
if("Notification" in window){
 Notification.requestPermission();
}

// PWA
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
