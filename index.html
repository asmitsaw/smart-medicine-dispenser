<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Medicine Dashboard</title>

  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
    body {background:#020617;color:white;padding:20px;}
    .grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;}
    .card {background:#111827;padding:20px;border-radius:15px;}
    button,input {width:100%;padding:10px;border-radius:10px;border:none;}
    button {background:#22c55e;color:white;}
    #popup {position:fixed;bottom:20px;right:20px;padding:15px;border-radius:10px;display:none;}
  </style>
</head>

<body>

<h1>💊 Smart Medicine</h1>

<div class="grid">

<div class="card">
<h2>Status</h2>
<div id="status">Loading...</div>
<div id="connection">Online</div>
</div>

<div class="card">
<h2>Time</h2>
<div id="clock"></div>
</div>

<div class="card">
<button onclick="dispense(event)">Dispense</button>
</div>

<div class="card">
<input type="time" id="timeInput">
<button onclick="setTime()">Set Time</button>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<img id="cam" width="100%">
</div>

</div>

<div id="popup"><span id="popupText"></span></div>

<script>
const token = "9IZnV6T6HxYj6A4wMb6dM-aoUAo0J8eU";

// CLOCK
setInterval(()=>{clock.innerText=new Date().toLocaleTimeString()},1000);

// DISPENSE
function dispense(e){
 let b=e.target;b.disabled=true;
 fetch(`https://blynk.cloud/external/api/update?token=${token}&V1=1`)
 .then(()=>setTimeout(()=>b.disabled=false,3000));
}

// TIME
function setTime(){
 let t=timeInput.value;if(!t)return alert("Select time");
 let [h,m]=t.split(":");
 fetch(`https://blynk.cloud/external/api/update?token=${token}&V0=${h*3600+m*60}`);
}

// POPUP
function show(msg,c){
 popupText.innerText=msg;
 popup.style.background=c;
 popup.style.display="block";
 setTimeout(()=>popup.style.display="none",3000);
}

// CHART
let taken=localStorage.taken||0;
let missed=localStorage.missed||0;

let chart=new Chart(chart,{
 type:'doughnut',
 data:{labels:['Taken','Missed'],
 datasets:[{data:[taken,missed],backgroundColor:['green','red']}]}
});

// CAMERA
function camLoad(){
 cam.src="http://192.168.1.101/capture?"+Date.now();
}

// STATUS
let last="";
function getStatus(){
 fetch(`https://blynk.cloud/external/api/get?token=${token}&V3`)
 .then(r=>r.text())
 .then(d=>{
  status.innerText=d;

  if(d!=last){
   if(d.includes("Take")) show("⏰ Take Medicine","orange");
   if(d.includes("Taken")){taken++;localStorage.taken=taken;camLoad();}
   if(d.includes("Missed")){missed++;localStorage.missed=missed;}
   chart.data.datasets[0].data=[taken,missed];
   chart.update();
   last=d;
  }
 });
}

getStatus();
setInterval(getStatus,2000);

// PWA
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
